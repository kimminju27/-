name: 자동 글 생성

on:
  schedule:
    # KST 기준 (UTC+9) — 모두 UTC 자정(KST 09:00) 이후 실행
    # 오전 10시 KST = UTC 01:00
    - cron: '0 1 * * *'
    # 오후 1시 KST = UTC 04:00
    - cron: '0 4 * * *'
    # 오후 7시 KST = UTC 10:00
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '생성 모드'
        required: true
        default: 'news'
        type: choice
        options:
          - news
          - product_review
      categories:
        description: '뉴스 카테고리 (쉼표 구분) — news 모드용: 경제,주식,부동산,복지정책'
        required: false
        default: '경제,주식'
      product_links:
        description: |
          제품 링크 목록 — product_review 모드용
          한 줄에 하나씩 입력: URL|플랫폼
          예) https://coupang.com/xxx|coupang
              https://naver.com/xxx|naver
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 카테고리 결정 (스케줄 자동 배분)
        id: cats
        run: |
          HOUR=$(date -u +%H)
          # 요일(0=일,1=월,...,6=토)로 주간 로테이션
          DOW=$(date -u +%u)
          if [ "$HOUR" = "01" ]; then
            # 오전 10시 — 요일별 다른 조합
            case $DOW in
              1) echo "CATS=경제,부동산_청약" >> $GITHUB_OUTPUT ;;
              2) echo "CATS=부동산,복지_청년" >> $GITHUB_OUTPUT ;;
              3) echo "CATS=경제_소비,주식" >> $GITHUB_OUTPUT ;;
              4) echo "CATS=부동산_재개발,세금" >> $GITHUB_OUTPUT ;;
              5) echo "CATS=경제_고용,복지정책" >> $GITHUB_OUTPUT ;;
              6) echo "CATS=주식_ETF,부동산_전세" >> $GITHUB_OUTPUT ;;
              *) echo "CATS=금융,경제" >> $GITHUB_OUTPUT ;;
            esac
          elif [ "$HOUR" = "04" ]; then
            # 오후 1시 — 요일별 다른 조합
            case $DOW in
              1) echo "CATS=주식,복지_출산" >> $GITHUB_OUTPUT ;;
              2) echo "CATS=주식_해외,경제_소비" >> $GITHUB_OUTPUT ;;
              3) echo "CATS=복지정책,부동산" >> $GITHUB_OUTPUT ;;
              4) echo "CATS=주식_ETF,경제_고용" >> $GITHUB_OUTPUT ;;
              5) echo "CATS=금융,부동산_청약" >> $GITHUB_OUTPUT ;;
              6) echo "CATS=세금,복지_노인" >> $GITHUB_OUTPUT ;;
              *) echo "CATS=경제,주식" >> $GITHUB_OUTPUT ;;
            esac
          elif [ "$HOUR" = "08" ]; then
            # 오후 5시 — 요일별 다른 조합
            case $DOW in
              1) echo "CATS=복지_청년,주식_해외" >> $GITHUB_OUTPUT ;;
              2) echo "CATS=부동산_전세,금융" >> $GITHUB_OUTPUT ;;
              3) echo "CATS=세금,주식" >> $GITHUB_OUTPUT ;;
              4) echo "CATS=복지_출산,경제" >> $GITHUB_OUTPUT ;;
              5) echo "CATS=부동산,주식_ETF" >> $GITHUB_OUTPUT ;;
              6) echo "CATS=경제_소비,복지_노인" >> $GITHUB_OUTPUT ;;
              *) echo "CATS=주식,복지정책" >> $GITHUB_OUTPUT ;;
            esac
          else
            # 오후 7시 — 요일별 다른 조합
            case $DOW in
              1) echo "CATS=복지정책,부동산_재개발" >> $GITHUB_OUTPUT ;;
              2) echo "CATS=경제_고용,주식_해외" >> $GITHUB_OUTPUT ;;
              3) echo "CATS=금융,복지_청년" >> $GITHUB_OUTPUT ;;
              4) echo "CATS=부동산_전세,경제_소비" >> $GITHUB_OUTPUT ;;
              5) echo "CATS=세금,주식" >> $GITHUB_OUTPUT ;;
              6) echo "CATS=복지_노인,부동산" >> $GITHUB_OUTPUT ;;
              *) echo "CATS=복지정책,부동산" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: 글 자동 생성
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GENERATION_MODE: ${{ github.event.inputs.mode || 'news' }}
          CATEGORIES: ${{ github.event.inputs.categories || steps.cats.outputs.CATS }}
          PRODUCT_LINKS: ${{ github.event.inputs.product_links || '' }}
        run: node scripts/auto-generate.mjs

      - name: 변경사항 커밋 & 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: 새 글 자동 생성 🤖"
          commit_user_name: "Auto Post Bot"
          commit_user_email: "bot@bloginfo360.com"
          file_pattern: "posts/*.html index.html sitemap.xml"
