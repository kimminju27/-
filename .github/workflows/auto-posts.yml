name: 자동 글 생성

on:
  schedule:
    # KST 기준 (UTC+9) — GitHub Actions 평균 4시간 지연 감안하여 앞당김
    # 목표 오전 9시 KST → UTC 20:00 (전날) 요청
    - cron: '0 20 * * *'
    # 목표 오후 1시 KST → UTC 00:00 요청
    - cron: '0 0 * * *'
    # 목표 오후 7시 KST → UTC 10:00 (지연 적어서 유지)
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '생성 모드'
        required: true
        default: 'news'
        type: choice
        options:
          - news
          - product_review
      categories:
        description: '뉴스 카테고리 (쉼표 구분) — news 모드용: 경제,주식,부동산,복지정책'
        required: false
        default: '경제,주식'
      product_links:
        description: |
          제품 링크 목록 — product_review 모드용
          한 줄에 하나씩 입력: URL|플랫폼
          예) https://coupang.com/xxx|coupang
              https://naver.com/xxx|naver
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 카테고리 결정 (스케줄 자동 배분)
        id: cats
        run: |
          # github.event.schedule 로 슬롯 식별 — 실제 실행 시각이 아닌 cron 표현식 기준
          # GitHub Actions 지연으로 HOUR가 달라져도 슬롯이 바뀌지 않음
          SCHEDULE="${{ github.event.schedule }}"
          # 요일(1=월,...,7=일) — cron 등록 시각(UTC) 기준 요일
          DOW=$(date -u +%u)
          # 규칙: 하루 3개 슬롯에서 카테고리가 겹치지 않도록 설계
          if [ "$SCHEDULE" = "0 20 * * *" ]; then
            # 슬롯 A — 오전 9시 KST 목표 (UTC 20:00 등록)
            case $DOW in
              1) echo "CATS=경제_환율,부동산_청약" >> $GITHUB_OUTPUT ;;
              2) echo "CATS=부동산_전세,복지_출산" >> $GITHUB_OUTPUT ;;
              3) echo "CATS=경제_고용,주식_반도체" >> $GITHUB_OUTPUT ;;
              4) echo "CATS=부동산_신도시,세금_증여" >> $GITHUB_OUTPUT ;;
              5) echo "CATS=경제_GDP,복지_아동" >> $GITHUB_OUTPUT ;;
              6) echo "CATS=주식_2차전지,금융_재테크" >> $GITHUB_OUTPUT ;;
              *) echo "CATS=부동산_임대차,주식_AI" >> $GITHUB_OUTPUT ;;
            esac
          elif [ "$SCHEDULE" = "0 0 * * *" ]; then
            # 슬롯 B — 오후 1시 KST 목표 (UTC 00:00 등록)
            case $DOW in
              1) echo "CATS=주식_ETF,복지_청년" >> $GITHUB_OUTPUT ;;
              2) echo "CATS=주식_해외,경제_물가" >> $GITHUB_OUTPUT ;;
              3) echo "CATS=복지_노인,부동산_재개발" >> $GITHUB_OUTPUT ;;
              4) echo "CATS=주식_배당,경제_수출" >> $GITHUB_OUTPUT ;;
              5) echo "CATS=금융_청약통장,부동산_빌라" >> $GITHUB_OUTPUT ;;
              6) echo "CATS=세금_양도세,복지_실업급여" >> $GITHUB_OUTPUT ;;
              *) echo "CATS=경제_금리,복지_기초연금" >> $GITHUB_OUTPUT ;;
            esac
          else
            # 슬롯 C — 오후 7시 KST 목표 (UTC 10:00 등록) — 보험·세금 고CPC 카테고리
            case $DOW in
              1) echo "CATS=보험,세금_양도세" >> $GITHUB_OUTPUT ;;
              2) echo "CATS=보험,금융_예금" >> $GITHUB_OUTPUT ;;
              3) echo "CATS=보험,세금_종소세" >> $GITHUB_OUTPUT ;;
              4) echo "CATS=보험,금융_신용" >> $GITHUB_OUTPUT ;;
              5) echo "CATS=보험,세금_근로소득" >> $GITHUB_OUTPUT ;;
              6) echo "CATS=보험,경제_관세" >> $GITHUB_OUTPUT ;;
              *) echo "CATS=보험,금융_연금" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: 글 자동 생성
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GENERATION_MODE: ${{ github.event.inputs.mode || 'news' }}
          CATEGORIES: ${{ github.event.inputs.categories || steps.cats.outputs.CATS }}
          PRODUCT_LINKS: ${{ github.event.inputs.product_links || '' }}
        run: node scripts/auto-generate.mjs

      - name: 변경사항 커밋 & 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: 새 글 자동 생성 🤖"
          commit_user_name: "Auto Post Bot"
          commit_user_email: "bot@bloginfo360.com"
          file_pattern: "posts/*.html index.html sitemap.xml topics-history.json"
