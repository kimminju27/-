name: 네이버 블로그 자동 임시저장 (mju427)

on:
  schedule:
    # KST 기준 (UTC+9) — GitHub Actions 평균 4시간 지연 감안하여 앞당김
    # 목표 오전 9시 KST → UTC 20:00 (전날) 요청
    - cron: '0 20 * * *'
    # 목표 오후 1시 KST → UTC 00:00 요청
    - cron: '0 0 * * *'
    # 목표 오후 7시 KST → UTC 10:00 (지연 적어서 유지)
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      categories:
        description: '카테고리 (쉼표 구분): 경제,주식,부동산,복지정책,보험,세금'
        required: false
        default: '경제,주식'

jobs:
  naver-draft:
    runs-on: self-hosted

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 카테고리 결정 (스케줄 자동 배분)
        id: cats
        shell: pwsh
        run: |
          $schedule = "${{ github.event.schedule }}"
          $dow = [int](Get-Date).ToUniversalTime().DayOfWeek
          if ($dow -eq 0) { $dow = 7 }  # 일요일=0 → 7로 변환

          $slotA = @{1="보험,세금";2="부동산,복지정책";3="주식,보험";4="세금,부동산";5="복지정책,주식";6="보험,부동산";7="세금,주식"}
          $slotB = @{1="복지정책,주식";2="보험,세금";3="부동산,복지정책";4="주식,보험";5="세금,부동산";6="복지정책,주식";7="보험,부동산"}
          $slotC = @{1="세금,복지정책";2="주식,보험";3="세금,부동산";4="복지정책,주식";5="보험,세금";6="부동산,복지정책";7="주식,보험"}

          if ($schedule -eq "0 20 * * *")     { $cats = $slotA[$dow] }
          elseif ($schedule -eq "0 0 * * *")  { $cats = $slotB[$dow] }
          else                                 { $cats = $slotC[$dow] }

          echo "CATS=$cats" >> $env:GITHUB_OUTPUT
          Write-Host "선택된 카테고리: $cats"

      - name: 의존성 설치 (naver-blog-team)
        working-directory: naver-blog-team
        run: npm install

      - name: Playwright Chromium 설치
        working-directory: naver-blog-team
        run: npx playwright install chromium

      - name: 글 생성 + 네이버 블로그 임시저장
        working-directory: naver-blog-team
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
          NAVER_BLOG_ID: mju427
          CATEGORIES: ${{ github.event.inputs.categories || steps.cats.outputs.CATS }}
          TARGET: naver
          DRAFT_ONLY: 'true'
          CI: 'true'
        run: node scripts/run.mjs
