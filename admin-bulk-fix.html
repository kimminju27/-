<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>포스트 일괄 수정 — bloginfo360.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{brand:{600:"#16a34a",700:"#15803d"},ink:{900:"#0f172a",500:"#475569",100:"#f1f5f9"}},fontFamily:{sans:["Noto Sans KR","sans-serif"]}}}}</script>
  <style>body{font-family:"Noto Sans KR",sans-serif;}</style>
</head>
<body class="bg-gray-50 text-ink-900 min-h-screen">

<div class="max-w-3xl mx-auto px-4 py-12">
  <h1 class="text-2xl font-black text-ink-900 mb-2">🔧 포스트 일괄 수정 도구</h1>
  <p class="text-sm text-ink-500 mb-8">기존 포스트의 <code class="bg-red-50 text-red-600 px-1 rounded">noindex</code> → <code class="bg-green-50 text-green-600 px-1 rounded">index</code> 변경 + AdSense 유닛 자동 추가</p>

  <!-- 토큰 입력 -->
  <div id="tokenSection" class="bg-white rounded-2xl border border-gray-200 p-6 mb-6">
    <h2 class="font-bold text-sm text-ink-500 uppercase mb-4">GitHub 인증</h2>
    <div class="flex gap-3">
      <input id="tokenInput" type="password" placeholder="GitHub Personal Access Token"
        class="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-600">
      <button onclick="loadPosts()" class="bg-brand-600 hover:bg-brand-700 text-white font-bold px-6 py-3 rounded-xl text-sm transition-colors">
        포스트 불러오기
      </button>
    </div>
    <p class="text-xs text-ink-500 mt-2">
      토큰 발급: <a href="https://github.com/settings/tokens" target="_blank" class="text-brand-600 underline">github.com/settings/tokens</a>
      → Generate new token → repo 권한 체크
    </p>
  </div>

  <!-- 결과 -->
  <div id="resultSection" class="hidden">
    <div class="flex items-center justify-between mb-4">
      <div>
        <span id="postCount" class="font-bold text-ink-900"></span>
        <span class="text-sm text-ink-500 ml-2">개 포스트 발견</span>
      </div>
      <button onclick="fixAll()" id="fixAllBtn"
        class="bg-brand-600 hover:bg-brand-700 text-white font-bold px-6 py-3 rounded-xl text-sm transition-colors">
        🔧 전체 수정 시작
      </button>
    </div>

    <div id="postList" class="space-y-2"></div>

    <div id="summary" class="hidden mt-6 bg-green-50 border border-green-200 rounded-2xl p-5">
      <p class="font-bold text-green-700 mb-1">✅ 수정 완료!</p>
      <p id="summaryText" class="text-sm text-green-600"></p>
    </div>
  </div>

  <div id="logBox" class="hidden mt-6 bg-gray-900 rounded-2xl p-5 text-xs text-green-400 font-mono max-h-64 overflow-y-auto"></div>
</div>

<script>
  const OWNER = 'kimminju27';
  const REPO = '-';
  const API = 'https://api.github.com';
  const ADSENSE_CLIENT = 'ca-pub-1954893264438671';
  const ADSENSE_SLOT_MAIN = '2954893265';
  const ADSENSE_SLOT_ARTICLE = '2954893264';

  let posts = [];
  let token = '';

  function log(msg, color = '#4ade80') {
    const box = document.getElementById('logBox');
    box.classList.remove('hidden');
    box.innerHTML += `<div style="color:${color}">${msg}</div>`;
    box.scrollTop = box.scrollHeight;
  }

  function getToken() {
    return document.getElementById('tokenInput').value.trim()
      || sessionStorage.getItem('gh_token') || '';
  }

  async function ghGet(path) {
    const t = getToken();
    const res = await fetch(`${API}${path}`, {
      headers: { Authorization: `token ${t}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`GitHub API 오류: ${res.status} ${path}`);
    return res.json();
  }

  async function ghPut(path, content, sha, message) {
    const t = getToken();
    const encoded = utf8ToBase64(content);
    const res = await fetch(`${API}${path}`, {
      method: 'PUT',
      headers: {
        Authorization: `token ${t}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message, content: encoded, sha })
    });
    return res.ok;
  }

  function utf8ToBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
  }

  function decodeB64(b64) {
    const raw = atob(b64.replace(/\n/g, ''));
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

  // 포스트 HTML 수정 함수
  function fixPostHtml(html, filename) {
    let changed = false;
    let result = html;

    // 1. noindex → index
    if (result.includes('noindex, nofollow') || result.includes('noindex,nofollow')) {
      result = result.replace(/noindex,\s*nofollow/g, 'index, follow');
      changed = true;
    }

    // 2. AdSense 스크립트 없으면 추가 (canonical 태그 뒤)
    if (!result.includes('adsbygoogle.js') && !result.includes('pagead2.googlesyndication')) {
      const adsenseScript = `\n  <meta name="google-adsense-account" content="${ADSENSE_CLIENT}">\n  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${ADSENSE_CLIENT}" crossorigin="anonymous"><\/script>`;
      // canonical 태그 뒤에 삽입, 없으면 </head> 앞에
      if (result.includes('<link rel="canonical"')) {
        result = result.replace(/(<link rel="canonical"[^>]*>)/, `$1${adsenseScript}`);
      } else {
        result = result.replace('</head>', adsenseScript + '\n</head>');
      }
      changed = true;
    }

    // 3. 광고 유닛 없으면 본문 상단/하단에 추가
    if (!result.includes('adsbygoogle') || !result.includes('ins class="adsbygoogle"')) {
      const adTop = `\n        <!-- 광고: 본문 상단 -->\n        <div class="my-6">\n          <ins class="adsbygoogle"\n               style="display:block"\n               data-ad-client="${ADSENSE_CLIENT}"\n               data-ad-slot="${ADSENSE_SLOT_MAIN}"\n               data-ad-format="auto"\n               data-full-width-responsive="true"></ins>\n          <script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script>\n        </div>\n`;

      const adBottom = `\n        <!-- 광고: 본문 하단 -->\n        <div class="my-8">\n          <ins class="adsbygoogle"\n               style="display:block"\n               data-ad-client="${ADSENSE_CLIENT}"\n               data-ad-slot="${ADSENSE_SLOT_MAIN}"\n               data-ad-format="auto"\n               data-full-width-responsive="true"></ins>\n          <script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script>\n        </div>\n`;

      // prose div 시작 직전에 상단 광고 삽입
      if (result.includes('<div class="prose">')) {
        result = result.replace('<div class="prose">', adTop + '<div class="prose">');
        changed = true;
      }
      // prose div 끝 직후에 하단 광고 삽입
      if (result.includes('</div>') && result.includes('prose')) {
        const proseEnd = result.lastIndexOf('</div>\n\n        <div class="mt-10');
        if (proseEnd > -1) {
          result = result.slice(0, proseEnd) + adBottom + result.slice(proseEnd);
          changed = true;
        }
      }
    }

    return { html: result, changed };
  }

  async function loadPosts() {
    try {
      log('📂 posts/ 폴더 로딩 중...');
      const files = await ghGet(`/repos/${OWNER}/${REPO}/contents/posts`);
      posts = files.filter(f => f.name.endsWith('.html') && f.name !== '_template.html' && f.name !== 'sample.html');

      document.getElementById('postCount').textContent = posts.length;
      document.getElementById('resultSection').classList.remove('hidden');

      const listEl = document.getElementById('postList');
      listEl.innerHTML = '';
      posts.forEach(p => {
        listEl.innerHTML += `
          <div id="row-${p.sha.slice(0,8)}" class="flex items-center gap-3 bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm">
            <span class="flex-1 text-ink-900 truncate font-medium">${p.name}</span>
            <span id="status-${p.sha.slice(0,8)}" class="text-xs text-ink-500 bg-gray-100 px-2 py-0.5 rounded-full">대기</span>
          </div>`;
      });
      log(`✅ ${posts.length}개 포스트 발견`);
    } catch (e) {
      log('❌ ' + e.message, '#f87171');
    }
  }

  async function fixAll() {
    const btn = document.getElementById('fixAllBtn');
    btn.disabled = true;
    btn.textContent = '수정 중...';

    let fixed = 0, skipped = 0, failed = 0;

    for (const post of posts) {
      const key = post.sha.slice(0, 8);
      const statusEl = document.getElementById(`status-${key}`);

      try {
        statusEl.textContent = '불러오는 중...';
        statusEl.className = 'text-xs text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full';

        const fileData = await ghGet(`/repos/${OWNER}/${REPO}/contents/posts/${post.name}`);
        const html = decodeB64(fileData.content);

        const { html: newHtml, changed } = fixPostHtml(html, post.name);

        if (!changed) {
          statusEl.textContent = '✅ 이미 정상';
          statusEl.className = 'text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded-full';
          skipped++;
          log(`⏭️ ${post.name} — 이미 정상`);
          continue;
        }

        statusEl.textContent = '저장 중...';
        const ok = await ghPut(
          `/repos/${OWNER}/${REPO}/contents/posts/${post.name}`,
          newHtml, fileData.sha,
          `fix: ${post.name} — robots index + AdSense 추가`
        );

        if (ok) {
          statusEl.textContent = '🔧 수정 완료';
          statusEl.className = 'text-xs text-brand-600 bg-green-50 px-2 py-0.5 rounded-full';
          fixed++;
          log(`🔧 ${post.name} — 수정 완료`);
        } else {
          throw new Error('저장 실패');
        }
      } catch (e) {
        statusEl.textContent = '❌ 실패';
        statusEl.className = 'text-xs text-red-500 bg-red-50 px-2 py-0.5 rounded-full';
        failed++;
        log(`❌ ${post.name} — ${e.message}`, '#f87171');
      }

      // GitHub API rate limit 방지 (0.5초 간격)
      await new Promise(r => setTimeout(r, 500));
    }

    document.getElementById('summary').classList.remove('hidden');
    document.getElementById('summaryText').textContent =
      `수정: ${fixed}개 / 이미 정상: ${skipped}개 / 실패: ${failed}개`;

    btn.textContent = '완료!';
    log(`\n📊 결과 — 수정 ${fixed}개, 이미정상 ${skipped}개, 실패 ${failed}개`);
  }
</script>
</body>
</html>
