<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글 편집기 - 경제적 자유를 위한 도전</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <!-- Quill.js -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:"#f0fdf4", 100:"#dcfce7", 600:"#16a34a", 700:"#15803d" },
            gold:  { 400:"#fbbf24", 500:"#f59e0b" },
            ink:   { 900:"#0f172a", 700:"#1e293b", 500:"#475569", 300:"#94a3b8", 100:"#f1f5f9" }
          },
          fontFamily: { sans: ["Noto Sans KR", "sans-serif"] }
        }
      }
    }
  </script>
  <style>
    body { font-family: "Noto Sans KR", sans-serif; }
    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 18px; height: 18px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Quill 에디터 스타일 */
    #quill-editor {
      min-height: 480px;
      font-family: "Noto Sans KR", sans-serif;
      font-size: 0.97rem;
      line-height: 1.9;
    }
    .ql-container {
      font-family: "Noto Sans KR", sans-serif;
      font-size: 0.97rem;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      border-color: #f1f5f9 !important;
    }
    .ql-toolbar {
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      border-color: #f1f5f9 !important;
      background: #f8fafc;
    }
    .ql-editor { min-height: 480px; }
    .ql-editor h2 { font-size: 1.35rem; font-weight: 700; color: #0f172a; margin: 1.5rem 0 0.5rem; }
    .ql-editor h3 { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin: 1.2rem 0 0.4rem; }
    .ql-editor p { color: #475569; margin-bottom: 0.8rem; }
    .ql-editor blockquote {
      background: #f0fdf4;
      border-left: 4px solid #16a34a;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      color: #1e293b;
    }

    /* 버튼 스타일 */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      background: #16a34a; color: #fff;
      padding: 10px 20px; border-radius: 8px;
      font-weight: 700; font-size: 0.9rem;
      border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #15803d; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:focus { outline: none; box-shadow: 0 0 0 3px rgba(22,163,74,0.3); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 6px;
      background: #fff; color: #475569;
      padding: 10px 20px; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem;
      border: 1.5px solid #e2e8f0; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .btn-secondary:hover { background: #f8fafc; border-color: #94a3b8; }

    /* 폼 입력 */
    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #f1f5f9;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #0f172a;
      background: #fff;
      font-family: "Noto Sans KR", sans-serif;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input:focus {
      outline: none;
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
    }
    .form-label { display: block; font-weight: 700; font-size: 0.875rem; color: #1e293b; margin-bottom: 6px; }
    .form-hint { font-size: 0.78rem; color: #94a3b8; margin-top: 4px; }

    /* 카운터 */
    #descCount { transition: color 0.15s; }

    /* 저장 오버레이 */
    #savingOverlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.5);
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
    }
    #savingOverlay .save-box {
      background: #fff;
      padding: 28px 40px;
      border-radius: 16px;
      text-align: center;
    }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 10px;
      font-size: 0.875rem; font-weight: 600;
      z-index: 200; opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast-success { background: #16a34a; color: #fff; }
    .toast-error { background: #ef4444; color: #fff; }
  </style>
</head>
<body class="bg-ink-100 text-ink-900 min-h-screen">

  <header class="sticky top-0 z-50 bg-white border-b border-ink-100 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="text-xl font-black text-brand-600 leading-tight">경제적 자유를<br class="sm:hidden"> 위한 도전</a>
      <div class="flex items-center gap-3">
        <a href="admin.html" class="btn-secondary text-sm py-2 px-4">← 목록으로</a>
        <span id="modeLabel" class="text-sm font-bold text-ink-500 bg-ink-100 px-3 py-1 rounded-full">신규 작성</span>
      </div>
    </div>
  </header>

  <!-- 로딩 화면 (수정 모드에서 데이터 로드 중) -->
  <div id="initLoading" class="hidden min-h-[calc(100vh-73px)] flex items-center justify-center">
    <div class="text-center">
      <div class="border-4 border-ink-100 border-t-brand-600 rounded-full w-10 h-10 animate-spin mx-auto mb-4"></div>
      <p class="text-ink-500 text-sm">포스트를 불러오는 중...</p>
    </div>
  </div>

  <!-- 에디터 영역 -->
  <div id="editorSection" class="max-w-4xl mx-auto px-4 py-10">
    <h1 id="pageTitle" class="text-2xl font-black text-ink-900 mb-8">새 글 작성</h1>

    <div class="space-y-6">

      <!-- 제목 -->
      <div class="bg-white rounded-2xl border border-ink-100 p-6">
        <label class="form-label" for="titleInput">제목 <span class="text-red-500">*</span></label>
        <input
          id="titleInput"
          type="text"
          class="form-input"
          placeholder="글 제목을 입력하세요"
          maxlength="100"
        >
      </div>

      <!-- 카테고리 + 날짜 -->
      <div class="bg-white rounded-2xl border border-ink-100 p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div>
            <label class="form-label" for="categorySelect">카테고리 <span class="text-red-500">*</span></label>
            <select id="categorySelect" class="form-input">
              <option value="경제">경제</option>
              <option value="부동산">부동산</option>
              <option value="주식">주식</option>
              <option value="복지정책">복지정책</option>
              <option value="세금">세금</option>
              <option value="금융">금융</option>
              <option value="연예계">연예계</option>
              <option value="제품리뷰">제품리뷰</option>
            </select>
          </div>
          <div>
            <label class="form-label" for="dateInput">발행일 <span class="text-red-500">*</span></label>
            <input id="dateInput" type="date" class="form-input">
          </div>
        </div>
      </div>

      <!-- 설명 -->
      <div class="bg-white rounded-2xl border border-ink-100 p-6">
        <label class="form-label" for="descInput">
          설명 (meta description) <span class="text-red-500">*</span>
        </label>
        <textarea
          id="descInput"
          class="form-input"
          rows="3"
          placeholder="검색엔진에 표시될 글 요약 설명 (80~120자 권장)"
          maxlength="200"
          oninput="updateDescCount()"
        ></textarea>
        <p class="form-hint flex justify-between">
          <span>80~120자 권장</span>
          <span id="descCount" class="font-mono">0자</span>
        </p>
      </div>

      <!-- 본문 에디터 -->
      <div class="bg-white rounded-2xl border border-ink-100 p-6">
        <label class="form-label mb-4">본문 <span class="text-red-500">*</span></label>
        <div id="quill-editor"></div>
      </div>

      <!-- 저장 버튼 -->
      <div class="flex items-center justify-between gap-4 pb-6">
        <a href="admin.html" class="btn-secondary">취소</a>
        <button id="saveBtn" onclick="savePost()" class="btn-primary px-8 py-3 text-base">
          <span id="saveBtnText">💾 저장</span>
          <span id="saveBtnSpinner" class="hidden"><span class="spinner"></span></span>
        </button>
      </div>
    </div>
  </div>

  <!-- 저장 중 오버레이 -->
  <div id="savingOverlay" class="hidden">
    <div class="save-box">
      <div class="border-4 border-ink-100 border-t-brand-600 rounded-full w-12 h-12 animate-spin mx-auto mb-4"></div>
      <p id="savingMsg" class="text-ink-700 font-bold text-sm">GitHub에 저장 중...</p>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast"></div>

  <footer class="border-t border-ink-100 bg-white mt-4">
    <div class="max-w-5xl mx-auto px-4 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-ink-300">
      <span class="font-bold text-ink-500">경제적 자유를 위한 도전</span>
      <span>2026. All rights reserved.</span>
    </div>
  </footer>

<script>
  const OWNER = 'kimminju27';
  const REPO = '-';
  const API_BASE = 'https://api.github.com';

  let quill = null;
  let editMode = false;
  let editFileName = null;
  let editFileSha = null;

  // ── 초기화 ────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    // Token 확인
    const token = sessionStorage.getItem('gh_token');
    if (!token) {
      location.href = 'admin.html';
      return;
    }

    // 오늘 날짜 기본값
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = `${yyyy}-${mm}-${dd}`;

    // Quill 초기화
    initQuill();

    // URL 파라미터 확인
    const params = new URLSearchParams(location.search);
    const file = params.get('file');
    if (file) {
      editMode = true;
      editFileName = file;
      document.getElementById('modeLabel').textContent = '수정 모드';
      document.getElementById('pageTitle').textContent = '포스트 수정';
      loadExistingPost(file);
    }
  });

  // ── Quill 에디터 초기화 ───────────────────────────
  function initQuill() {
    // 커스텀 이미지 핸들러 (base64 인라인)
    const imageHandler = function() {
      const input = document.createElement('input');
      input.setAttribute('type', 'file');
      input.setAttribute('accept', 'image/*');
      input.click();
      input.onchange = () => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const range = quill.getSelection(true);
          quill.insertEmbed(range.index, 'image', e.target.result);
          quill.setSelection(range.index + 1);
        };
        reader.readAsDataURL(file);
      };
    };

    const toolbarOptions = [
      [{ 'header': [2, 3, false] }],
      [{ 'size': ['small', false, 'large', 'huge'] }],
      ['bold', 'italic', 'underline', 'strike'],
      [{ 'color': [] }, { 'background': [] }],
      [{ 'list': 'ordered' }, { 'list': 'bullet' }],
      ['blockquote', 'code-block'],
      ['link', 'image'],
      [{ 'align': [] }],
      ['clean']
    ];

    quill = new Quill('#quill-editor', {
      theme: 'snow',
      modules: {
        toolbar: {
          container: toolbarOptions,
          handlers: { image: imageHandler }
        }
      },
      placeholder: '본문 내용을 작성해주세요...'
    });
  }

  // ── 설명 글자수 카운터 ────────────────────────────
  function updateDescCount() {
    const len = document.getElementById('descInput').value.length;
    const el = document.getElementById('descCount');
    el.textContent = `${len}자`;
    if (len < 80) el.style.color = '#f59e0b';
    else if (len > 120) el.style.color = '#ef4444';
    else el.style.color = '#16a34a';
  }

  // ── 기존 포스트 로드 (수정 모드) ─────────────────
  async function loadExistingPost(fileName) {
    document.getElementById('initLoading').classList.remove('hidden');
    document.getElementById('editorSection').classList.add('hidden');
    try {
      const token = sessionStorage.getItem('gh_token');
      const res = await fetch(`${API_BASE}/repos/${OWNER}/${REPO}/contents/posts/${fileName}`, {
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });
      if (!res.ok) throw new Error('파일을 불러올 수 없습니다.');
      const data = await res.json();
      editFileSha = data.sha;
      const html = atob(data.content.replace(/\n/g, ''));

      // 파싱
      const titleMatch = html.match(/<title>([^<]+)<\/title>/i);
      if (titleMatch) {
        const raw = titleMatch[1].replace(/\s*-\s*경제적 자유를 위한 도전\s*$/, '').trim();
        document.getElementById('titleInput').value = raw;
      }

      const descMatch = html.match(/<meta name="description" content="([^"]+)"/i);
      if (descMatch) {
        document.getElementById('descInput').value = descMatch[1];
        updateDescCount();
      }

      const catMatch = html.match(/article:section"\s+content="([^"]+)"/i);
      if (catMatch) {
        const sel = document.getElementById('categorySelect');
        const opt = Array.from(sel.options).find(o => o.value === catMatch[1]);
        if (opt) sel.value = catMatch[1];
      }

      const dateMatch = html.match(/article:published_time"\s+content="([^"]+)"/i);
      if (dateMatch) {
        document.getElementById('dateInput').value = dateMatch[1].slice(0, 10);
      }

      // 본문: prose div 내용 추출
      const proseMatch = html.match(/<div class="prose">([\s\S]*?)<\/div>\s*<!-- 수정 9/i)
        || html.match(/<div class="prose">([\s\S]*?)<\/div>\s*\n\s*<!-- /i)
        || html.match(/<div class="prose">([\s\S]*?)<\/div>\s*<\/article>/i);

      // 더 넓은 범위로 prose 블록 추출
      const proseFull = extractProseContent(html);
      if (proseFull && quill) {
        quill.clipboard.dangerouslyPasteHTML(proseFull);
      }

    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      document.getElementById('initLoading').classList.add('hidden');
      document.getElementById('editorSection').classList.remove('hidden');
    }
  }

  function extractProseContent(html) {
    // prose 블록 추출 (태그 중첩 고려)
    const start = html.indexOf('<div class="prose">');
    if (start === -1) return '';
    const inner = html.slice(start + '<div class="prose">'.length);

    // 댓글/다음 섹션 전까지 추출
    const endMarkers = ['<!-- 수정 9', '<!-- tag', '</article>', '<div class="mt-8 flex'];
    let endIdx = inner.length;
    for (const m of endMarkers) {
      const idx = inner.indexOf(m);
      if (idx !== -1 && idx < endIdx) endIdx = idx;
    }
    return inner.slice(0, endIdx).trim();
  }

  // ── 저장 ──────────────────────────────────────────
  async function savePost() {
    const title = document.getElementById('titleInput').value.trim();
    const category = document.getElementById('categorySelect').value;
    const desc = document.getElementById('descInput').value.trim();
    const date = document.getElementById('dateInput').value;
    const bodyHtml = quill ? quill.root.innerHTML : '';

    // 유효성 검사
    if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }
    if (!desc) { showToast('설명을 입력해주세요.', 'error'); return; }
    if (!date) { showToast('발행일을 선택해주세요.', 'error'); return; }
    if (!bodyHtml || bodyHtml === '<p><br></p>') { showToast('본문을 입력해주세요.', 'error'); return; }

    const token = sessionStorage.getItem('gh_token');
    if (!token) { location.href = 'admin.html'; return; }

    // slug 생성
    let slug;
    if (editMode && editFileName) {
      slug = editFileName;
    } else {
      const ts = Date.now();
      slug = `post-${ts}.html`;
    }

    // HTML 생성
    const postHtml = buildPostHtml({ title, category, desc, date, bodyHtml, slug });
    const encoded = btoa(unescape(encodeURIComponent(postHtml)));

    showSavingOverlay(true);

    try {
      let body;
      if (editMode && editFileSha) {
        body = JSON.stringify({
          message: `Update post: ${slug}`,
          content: encoded,
          sha: editFileSha
        });
      } else {
        body = JSON.stringify({
          message: `Add post: ${slug}`,
          content: encoded
        });
      }

      const res = await fetch(`${API_BASE}/repos/${OWNER}/${REPO}/contents/posts/${slug}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || '저장에 실패했습니다.');
      }

      // index.html 카드 동기화
      document.getElementById('savingMsg').textContent = 'index.html 카드 동기화 중...';
      await syncIndexOnSave({ title, desc, category, date, slug, isEdit: editMode });

      // 신규 글이면 sitemap.xml도 업데이트
      if (!editMode) {
        document.getElementById('savingMsg').textContent = 'sitemap.xml 업데이트 중...';
        await syncSitemapOnSave({ slug, date });
      }

      showSavingOverlay(false);
      showToast(editMode ? '수정 완료! 목록으로 이동합니다.' : '저장 완료! 목록으로 이동합니다.', 'success');
      setTimeout(() => { location.href = 'admin.html'; }, 1500);
    } catch (err) {
      showSavingOverlay(false);
      showToast(err.message, 'error');
    }
  }

  // ── GitHub 유틸 ───────────────────────────────────
  function utf8ToBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
  }

  function decodeGhBase64(b64) {
    const raw = atob(b64.replace(/\n/g, ''));
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

  async function getGhFile(filepath) {
    const token = sessionStorage.getItem('gh_token');
    const res = await fetch(`${API_BASE}/repos/${OWNER}/${REPO}/contents/${filepath}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) return null;
    const d = await res.json();
    return { sha: d.sha, content: decodeGhBase64(d.content) };
  }

  async function putGhFile(filepath, content, sha, message) {
    const token = sessionStorage.getItem('gh_token');
    const res = await fetch(`${API_BASE}/repos/${OWNER}/${REPO}/contents/${filepath}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message, content: utf8ToBase64(content), sha })
    });
    return res.ok;
  }

  // ── 카테고리 스타일 ───────────────────────────────
  const CAT_CONFIG = {
    '경제':     { emoji: '💰', tagColor: '#fbbf24', tagBg: 'rgba(251,191,36,0.15)', cardBg: 'linear-gradient(135deg,#0f172a,#1e3a5f)' },
    '부동산':   { emoji: '🏠', tagColor: '#34d399', tagBg: 'rgba(52,211,153,0.15)', cardBg: 'linear-gradient(135deg,#064e3b,#065f46)' },
    '주식':     { emoji: '📈', tagColor: '#60a5fa', tagBg: 'rgba(96,165,250,0.15)', cardBg: 'linear-gradient(135deg,#1e3a5f,#1d4ed8)' },
    '복지정책': { emoji: '🏛️', tagColor: '#c084fc', tagBg: 'rgba(192,132,252,0.15)', cardBg: 'linear-gradient(135deg,#3b0764,#6b21a8)' },

  function buildNewCard({ title, desc, category, date, slug }) {

    const dateStr = date.replace(/-/g, '.');

  function updateCardInIndex(html, slug, { title, desc, category, date }) {
    const shortDesc = (desc || '').substring(0, 80) + '...';
    const target = `posts/${slug}`;
    if (!html.includes(target)) return html;
    // split 방식: <!-- AUTO: --> 단위로 분리 후 해당 블록만 교체
    const parts = html.split('<!-- AUTO:');
    for (let i = 1; i < parts.length; i++) {
      if (parts[i].includes(target)) {
        let block = parts[i];
        // title 뒤 --> 까지를 새 제목으로 교체
        block = block.replace(/^[^>]*-->/, ` ${escHtml(title)} -->`);
        block = block.replace(/data-title="[^"]*"/, `data-title="${escAttrHtml(title)}"`);
        block = block.replace(/data-category="[^"]*"/, `data-category="${escAttrHtml(category)}"`);
        block = block.replace(/<h2[^>]*>[\s\S]*?<\/h2>/, `<h2 class="mt-2 font-bold text-ink-900 text-base leading-snug">${escHtml(title)}</h2>`);
        block = block.replace(/<p class="mt-1\.5 text-xs text-ink-500 line-clamp-2">[\s\S]*?<\/p>/, `<p class="mt-1.5 text-xs text-ink-500 line-clamp-2">${escHtml(shortDesc)}</p>`);
        parts[i] = block;
        break;
      }
    }
    return parts.join('<!-- AUTO:');
  }

  async function syncIndexOnSave({ title, desc, category, date, slug, isEdit }) {
    try {
      const idx = await getGhFile('index.html');
      if (!idx) return;
      let newHtml;
      if (isEdit) {
        newHtml = updateCardInIndex(idx.content, slug, { title, desc, category, date });
      } else {
        const card = buildNewCard({ title, desc, category, date, slug });
        const marker = '<!-- POSTS_START -->';
        if (idx.content.includes(marker)) {
          newHtml = idx.content.replace(marker, marker + '\n' + card);
        } else {
          newHtml = idx.content.replace(/(<div id="postGrid"[^>]*>)/, `$1\n      ${marker}\n${card}`);
        }
      }
      if (newHtml !== idx.content) {
        await putGhFile('index.html', newHtml, idx.sha,
          isEdit ? `admin: 포스트 카드 업데이트 (${slug})` : `admin: 새 포스트 카드 추가 (${slug})`);
      }
    } catch (e) { console.warn('index.html 동기화 오류:', e.message); }
  }

  async function syncSitemapOnSave({ slug, date }) {
    try {
      const sm = await getGhFile('sitemap.xml');
      if (!sm) return;
      const slugName = slug.replace(/\.html$/, '');
      if (sm.content.includes(`/posts/${slugName}`)) return; // 이미 있음
      const entry = `\n  <url>\n    <loc>https://bloginfo360.com/posts/${slugName}</loc>\n    <lastmod>${date}</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>`;
      const newXml = sm.content.replace('</urlset>', entry + '\n</urlset>');
      await putGhFile('sitemap.xml', newXml, sm.sha, `admin: sitemap 추가 (${slug})`);
    } catch (e) { console.warn('sitemap.xml 동기화 오류:', e.message); }
  }

      '세금': '📋', '금융': '🏦', '연예계': '🎬', '제품리뷰': '⭐'
    };
    return map[cat] || '📝';

  // ── 유틸 ──────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function escAttrHtml(str) {
    return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escJson(str) {
    return String(str).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r');
  }
